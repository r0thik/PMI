{% extends "base.html" %}
{% block title %}Регистрация — Локальный сайт{% endblock %}
{% block content %}
<section id="register">
  <h2>Регистрация</h2>
  <div class="card card-form">
    <form class="auth-form" method="post" action="{{ url_for('auth.register_post') }}">
      <label>
        Логин
        <input type="text" name="username" placeholder="Придумайте логин" />
      </label>
      <label>
        Email
        <input type="email" name="email" placeholder="Введите email" />
      </label>
      <label>
        Пароль
        <input type="password" name="password" placeholder="Придумайте пароль" />
      </label>
      <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
    </form>
  </div>
  <p class="desc">Уже есть аккаунт? <a href="/login">Войдите</a>.</p>
</section>
{% endblock %}
